name: Release

# Build the wheel/sdist and publish a GitHub Release when a version tag is pushed.
# Tagging is manual (`git tag -a v0.1.0 && git push origin v0.1.0`); this does not publish
# to PyPI — only a GitHub Release with the built artifacts attached.
on:
  push:
    tags:
      - "v*"

# Least privilege by default; the release job opts into write for the release/upload.
permissions:
  contents: read

# Third-party actions are pinned by commit SHA (version in the comment), matching ci.yml.
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release and upload the artifacts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Build wheel and sdist
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Smoke test (install the wheel and run the CLI)
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/translate-subs --version

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          dist/*
          --repo "${GITHUB_REPOSITORY}"
          --title "${GITHUB_REF_NAME}"
          --notes "Built artifacts for ${GITHUB_REF_NAME}. See the [CHANGELOG](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/CHANGELOG.md)."
          --verify-tag
