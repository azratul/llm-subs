name: Release

# Test and build the wheel/sdist, publish it to PyPI, and create a GitHub Release when a
# version tag is pushed. Tagging remains manual (`git tag -a vX.Y.Z && git push origin vX.Y.Z`).
#
# The three stages are separate jobs so each carries only its own privilege (the OIDC id-token
# never coexists with contents: write) and a failure after the PyPI upload — the one step that
# cannot be repeated, since a version can only be uploaded once — can be re-run per job instead
# of re-running the publish.
on:
  push:
    tags:
      - "v*"

# Least privilege by default; each job opts into exactly what it needs.
permissions:
  contents: read

# Third-party actions are pinned by commit SHA (version in the comment), matching ci.yml.
jobs:
  build:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          version: "0.11.8"  # pin the uv binary too; the SHA above only pins the action

      - name: Verify lockfile is current
        run: uv lock --check

      - name: Install ffmpeg (system dependency)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Verify tag matches pyproject.toml version
        run: |
          PKG_VERSION=$(python -c "import tomllib; d = tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          EXPECTED_TAG="v${PKG_VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pyproject.toml version ${EXPECTED_TAG}"
            exit 1
          fi

      - name: Lint (ruff)
        run: uv run ruff check translate_subs/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check translate_subs/ tests/

      - name: Type-check (mypy)
        run: uv run mypy translate_subs/   # strict = true is set in [tool.mypy]

      - name: Tests
        run: uv run pytest -q

      - name: Build wheel and sdist
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Smoke test (install the wheel and run the CLI)
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/pip check
          PKG_VERSION=$(python -c "import tomllib; d = tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          for COMMAND in llm-subs translate-subs; do
            ACTUAL_VERSION=$(/tmp/smoke/bin/${COMMAND} --version)
            if [ "${ACTUAL_VERSION}" != "${PKG_VERSION}" ]; then
              echo "${COMMAND} reported ${ACTUAL_VERSION}; expected ${PKG_VERSION}"
              exit 1
            fi
            /tmp/smoke/bin/${COMMAND} --help >/dev/null
          done
          # Exercise the real pipeline as a user would: a full identity round-trip (no LLM),
          # not just --help. Catches packaging gaps that only surface when parsing/reinsertion run.
          printf '1\n00:00:01,000 --> 00:00:03,000\nHello world.\n' > /tmp/smoke/ep.en.srt
          /tmp/smoke/bin/llm-subs translate /tmp/smoke/ep.en.srt \
            --provider identity --target es-latam --out-dir /tmp/smoke/out --non-interactive
          test -f "/tmp/smoke/out/ep.es-latam.ass" || { echo "expected output not produced"; exit 1; }

      - name: Upload built distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    needs: build
    timeout-minutes: 10
    runs-on: ubuntu-latest
    # Trusted Publishing to PyPI via OIDC: no long-lived PYPI_TOKEN. The PyPI publisher is bound to
    # this workflow and the `pypi` environment, so the job must declare both.
    environment: pypi
    permissions:
      id-token: write # mint the OIDC token PyPI exchanges for a short-lived upload credential
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          version: "0.11.8"  # pin the uv binary too; the SHA above only pins the action

      - name: Download built distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        run: uv publish --trusted-publishing always

  github-release:
    # The Release links users to the artifacts, so it is created only for a version that actually
    # made it to PyPI; if this job alone fails, re-run it without repeating the upload.
    needs: [build, publish-pypi]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release and upload the artifacts
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          dist/*
          --repo "${GITHUB_REPOSITORY}"
          --title "${GITHUB_REF_NAME}"
          --notes "Built artifacts for ${GITHUB_REF_NAME}. See the [CHANGELOG](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/CHANGELOG.md)."
          --verify-tag
