name: Release

# Test and build the wheel/sdist, publish it to PyPI, and create a GitHub Release when a
# version tag is pushed. Tagging remains manual (`git tag -a vX.Y.Z && git push origin vX.Y.Z`).
on:
  push:
    tags:
      - "v*"

# Least privilege by default; the release job opts into write for the release/upload.
permissions:
  contents: read

# Third-party actions are pinned by commit SHA (version in the comment), matching ci.yml.
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release and upload the artifacts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Verify lockfile is current
        run: uv lock --check

      - name: Install ffmpeg (system dependency)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Verify tag matches pyproject.toml version
        run: |
          PKG_VERSION=$(python -c "import tomllib; d = tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          EXPECTED_TAG="v${PKG_VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pyproject.toml version ${EXPECTED_TAG}"
            exit 1
          fi

      - name: Lint (ruff)
        run: uv run ruff check translate_subs/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check translate_subs/ tests/

      - name: Type-check (mypy)
        run: uv run mypy translate_subs/

      - name: Tests
        run: uv run pytest -q

      - name: Build wheel and sdist
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Smoke test (install the wheel and run the CLI)
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/pip check
          PKG_VERSION=$(python -c "import tomllib; d = tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          for COMMAND in llm-subs translate-subs; do
            ACTUAL_VERSION=$(/tmp/smoke/bin/${COMMAND} --version)
            if [ "${ACTUAL_VERSION}" != "${PKG_VERSION}" ]; then
              echo "${COMMAND} reported ${ACTUAL_VERSION}; expected ${PKG_VERSION}"
              exit 1
            fi
            /tmp/smoke/bin/${COMMAND} --help >/dev/null
          done

      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          dist/*
          --repo "${GITHUB_REPOSITORY}"
          --title "${GITHUB_REF_NAME}"
          --notes "Built artifacts for ${GITHUB_REF_NAME}. See the [CHANGELOG](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/CHANGELOG.md)."
          --verify-tag
